name: objective_c_helper
description: Helper utilities for objective_c tests and hooks.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  objective_c:
    path: ../objective_c
  native_toolchain_c: ^0.17.4
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  ffi: ^2.1.0
  native_test_helpers:
    path: ../native_test_helpers

dependency_overrides:
  code_assets:
    path: ../code_assets
  hooks:
    path: ../hooks
  native_toolchain_c:
    path: ../native_toolchain_c