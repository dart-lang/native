name: NullableTestObjCLibrary
description: 'Tests nullability for Objective-C methods'
language: objc
output: 'nullable_test_bindings.dart'
exclude-all-by-default: true
objc-interfaces:
  include:
    - NullableInterface
ffi-native:
  asset-id: 'package:ffigen/objc_test'
headers:
  entry-points:
    - 'nullable_test.m'
