name: CategoryTestObjCLibrary
description: 'Tests handling Objective-C categories'
language: objc
output:
  bindings: 'category_test_bindings.dart'
  objc-bindings: 'category_test_bindings.m'
exclude-all-by-default: true
objc-interfaces:
  include:
    - Thing
    - ChildOfThing
    - NSURL
    - ChildOfNSString
objc-categories:
  include:
    - Sub
    - Mul
    - CatImplementsProto
    - InstanceTypeCategory
    - InterfaceOnBuiltInType
    - StaticAndInstanceMethodsWithSameNameCategory
    - NSString
ffi-native:
  asset-id: 'package:ffigen/objc_test'
headers:
  entry-points:
    - 'category_test.h'
    # Include it twice, as a regression test for #353
    - 'category_test.h'
