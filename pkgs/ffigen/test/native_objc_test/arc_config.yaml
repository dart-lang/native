name: ArcTestObjCLibrary
description: 'Tests ARC'
language: objc
output: 'arc_test_bindings.dart'
exclude-all-by-default: true
functions:
  include:
    - objc_autoreleasePoolPop
    - objc_autoreleasePoolPush
objc-interfaces:
  include:
    - ArcTestObject
    - ArcDtorTestObject
ffi-native:
  asset-id: 'package:ffigen/objc_test'
headers:
  entry-points:
    - 'arc_test.h'
