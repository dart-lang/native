name: UtilTestObjCLibrary
description: 'Objective-C Utilities for testing'
language: objc
output: 'util_bindings.dart'
exclude-all-by-default: true
functions:
  include:
    - setAssociatedDisposableObject
    - objc_autoreleasePoolPush
    - objc_autoreleasePoolPop
objc-interfaces:
  include:
    - DisposableObject
ffi-native:
  asset-id: 'package:ffigen/objc_test'
headers:
  entry-points:
    - 'util.h'
