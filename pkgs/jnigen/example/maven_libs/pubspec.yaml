name: maven_libs
description: "A new Flutter plugin project."
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  jni:
    path: ../../../jni

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  jnigen:
    path: ../../../jnigen

flutter:
  plugin:
    platforms:
      android:
        package: com.example.maven_libs
        pluginClass: MavenLibsPlugin
